<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vijay Kumar — Scholar Dashboard</title><style>
:root{--bg:#0f1117;--bg-card:#1a1d27;--text:#e1e4ea;--text-dim:#8b8fa3;--border:#2a2d3a;--accent:#60a5fa;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.header{background:linear-gradient(135deg,#1a1d27,#1e2130);border-bottom:1px solid var(--border);padding:20px 32px}
.header a{color:var(--accent);text-decoration:none;font-size:.85rem}.header h1{font-size:1.6rem;font-weight:700;color:var(--accent);margin-top:8px}
.main{max-width:1200px;margin:0 auto;padding:32px 24px}.stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.stat{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 24px;text-align:center;min-width:100px}
.stat .num{font-size:1.8rem;font-weight:700;color:var(--accent)}.stat .lbl{font-size:.8rem;color:var(--text-dim)}
.section-title{font-size:1.1rem;font-weight:700;margin:28px 0 14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:all .25s;text-decoration:none;color:inherit;display:block;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.card:hover{border-color:#555;transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.3)}
.card .card-title{font-weight:600;font-size:.95rem;margin-bottom:6px}
.card .card-meta{font-size:.78rem;color:var(--text-dim)}
.card .card-venue{display:inline-block;font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:4px;margin-bottom:4px;background:#1e293b;color:#60a5fa}
.card .card-arrow{position:absolute;right:18px;top:50%;transform:translateY(-50%);opacity:0;transition:opacity .2s;color:var(--text-dim)}
.card:hover .card-arrow{opacity:1}
.accent-0::before{background:#f59e0b}.accent-1::before{background:#3b82f6}.accent-2::before{background:#8b5cf6}.accent-3::before{background:#10b981}.accent-4::before{background:#f43f5e}.accent-5::before{background:#14b8a6}.accent-6::before{background:#e879f9}.accent-7::before{background:#f97316}
.footer{text-align:center;padding:24px;color:var(--text-dim);font-size:.78rem;border-top:1px solid var(--border);margin-top:32px}
</style></head><body>
