<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Raffaello D'Andrea — Scholar Dashboard</title><style>
:root{--bg:#0f1117;--bg-card:#1a1d27;--text:#e1e4ea;--text-dim:#8b8fa3;--border:#2a2d3a;--accent:#60a5fa;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.header{background:linear-gradient(135deg,#1a1d27,#1e2130);border-bottom:1px solid var(--border);padding:20px 32px}
.header a{color:var(--accent);text-decoration:none;font-size:.85rem}.header h1{font-size:1.6rem;font-weight:700;color:var(--accent);margin-top:8px}
.main{max-width:1000px;margin:0 auto;padding:32px 24px}.stats{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.stat{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 24px;text-align:center;min-width:100px}
.stat .num{font-size:1.8rem;font-weight:700;color:var(--accent)}.stat .lbl{font-size:.8rem;color:var(--text-dim)}
.section-title{font-size:1.1rem;font-weight:700;margin:28px 0 14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:all .25s;text-decoration:none;color:inherit;display:block}
.card:hover{border-color:#555;transform:translateY(-2px)}.card .name{font-weight:600;font-size:.95rem}.card .desc{font-size:.8rem;color:var(--text-dim);margin-top:4px}
.footer{text-align:center;padding:24px;color:var(--text-dim);font-size:.78rem;border-top:1px solid var(--border);margin-top:32px}
</style></head><body>
<div class="header"><a href="../../index.html">← Back to UAV-Survey</a><h1>👤 Raffaello D'Andrea</h1><div style="color:var(--text-dim);margin-top:4px">Scholar Dashboard · Coming soon</div></div>
<div class="main"><div class="stats"><div class="stat"><div class="num">0</div><div class="lbl">Tracked Papers</div></div></div>
<div class="section-title">📚 Paper Library</div><p style="color:var(--text-dim);">暂无论文数据，待补充。</p></div>
<div class="footer">UAV-Survey · Scholar Tracking</div></body></html>
