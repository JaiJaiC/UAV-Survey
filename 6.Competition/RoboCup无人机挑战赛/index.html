<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoboCup 无人机挑战赛</title>
<style>
  :root { --bg:#0f1117; --bg-card:#1a1d27; --text:#e1e4ea; --text-dim:#8b8fa3; --border:#2a2d3a; --accent:#f97316; --radius:10px; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.6; }
  .header { background:linear-gradient(135deg, #1a1d27, #1e2130); border-bottom:1px solid var(--border); padding:20px 32px; }
  .header a { color:var(--accent); text-decoration:none; font-size:0.85rem; }
  .header h1 { font-size:1.6rem; font-weight:700; color:var(--accent); margin-top:8px; }
  .main { max-width:1000px; margin:0 auto; padding:32px 24px; }
  .section-title { font-size:1.1rem; font-weight:700; margin:28px 0 14px; color:var(--text); }
  .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:14px; }
  .card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; transition:all 0.25s; text-decoration:none; color:inherit; display:block; }
  .card:hover { border-color:#555; transform:translateY(-2px); }
  .card .name { font-weight:600; font-size:0.95rem; }
  .card .desc { font-size:0.8rem; color:var(--text-dim); margin-top:4px; }
  .footer { text-align:center; padding:24px; color:var(--text-dim); font-size:0.78rem; border-top:1px solid var(--border); margin-top:32px; }
</style>
</head>
<body>
<div class="header">
  <a href="../../index.html">← Back to UAV-Survey</a>
  <h1>🏆 RoboCup 无人机挑战赛</h1>
  <div style="color:var(--text-dim);margin-top:4px;">RoboCup UAV Challenge · 竞赛资料与准备</div>
</div>
<div class="main">
  <div class="section-title">📂 子目录</div>
  <div class="grid">
    <a href="Rotary-UAV/" class="card"><div class="name">🔄 Rotary-UAV</div><div class="desc">多旋翼无人机实物赛 · BOM 清单 · 软件培训</div></a>
    <a href="2025比赛成绩公示/" class="card"><div class="name">📊 2025 比赛成绩公示</div><div class="desc">成绩公示与比赛结果</div></a>
  </div>
  <div class="section-title">📄 文件</div>
  <div class="grid" id="fileGrid"></div>
</div>
<div class="footer">UAV-Survey · RoboCup 无人机挑战赛</div>
<script>
var files=[
  {name:"2026 中国机器人大赛暨 RoboCup 机器人世界杯中国赛 校内推荐晋级队伍汇总表",ext:"docx",path:"1780965312535957.docx"},
  {name:"2026 中国机器人大赛暨 RoboCup 机器人世界杯中国赛（中国机器人大赛赛区）专项赛比赛通知",ext:"pdf",path:"1781159377673588.pdf"}
];
var g=document.getElementById('fileGrid');
files.forEach(function(f){
  g.innerHTML+='<a href="'+f.path+'" class="card"><div class="name">📎 '+f.name+'</div><div class="desc">.'+f.ext+'</div></a>';
});
</script>
</body>
</html>
